name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/universe/package-lock.json

      - name: Install (universe)
        working-directory: apps/universe
        run: npm ci

      - name: Build (universe)
        working-directory: apps/universe
        run: npm run build

      - name: Assemble site
        shell: bash
        run: |
          set -euo pipefail

          rm -rf site
          mkdir -p site

          cp index.html README.md site/

          for day in $(seq 221 260); do
            mkdir -p "site/${day}"
            rsync -av "games/${day}/" "site/${day}/"
          done

          # Publish the built universe app under /universe/
          mkdir -p site/universe
          rsync -av apps/universe/dist/ site/universe/

          # Keep the old source-like URL working by redirecting it to the built app.
          mkdir -p site/apps/universe
          cat > site/apps/universe/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=../../universe/" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Redirecting...</title>
              <script>
                window.location.replace('../../universe/');
              </script>
            </head>
            <body></body>
          </html>
          EOF

          # Avoid Jekyll processing on GitHub Pages
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


